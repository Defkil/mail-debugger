name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 9.8.0
          run_install: false

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Connect your workspace by running "nx connect" and uncomment this line to enable task distribution
      # - run: pnpm dlx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Lint
      - run: pnpm exec nx run types:lint
      - run: pnpm exec nx run api-client:lint
      - run: pnpm exec nx run "@mail-debugger/server:lint"
      - run: pnpm exec nx run "@mail-debugger/cli:lint"
      - run: pnpm exec nx run "@mail-debugger/web:lint"
      - run: pnpm exec nx run "@mail-debugger/server-e2e:lint"

      # Build (must run before test — web tests need .svelte-kit/ from svelte-kit sync)
      - run: pnpm exec nx run types:build
      - run: pnpm exec nx run api-client:build
      - run: pnpm exec nx run "@mail-debugger/web:build"
      - run: pnpm exec nx run "@mail-debugger/server:build"
      - run: pnpm exec nx run "@mail-debugger/cli:build"
      - run: pnpm exec nx run mail-debugger-api:build
      - run: pnpm exec nx run mail-debugger-cli:build

      # Test
      - run: pnpm exec nx run api-client:test
      - run: pnpm exec nx run "@mail-debugger/server:test"
      - run: pnpm exec nx run "@mail-debugger/cli:test"
      - run: pnpm exec nx run "@mail-debugger/web:test"
      - run: pnpm exec nx run mail-debugger-api:test
      - run: pnpm exec nx run mail-debugger-cli:test

      # Typecheck
      - run: pnpm exec nx run types:typecheck
      - run: pnpm exec nx run api-client:typecheck
      - run: pnpm exec nx run "@mail-debugger/server:typecheck"
      - run: pnpm exec nx run "@mail-debugger/cli:typecheck"
      - run: pnpm exec nx run "@mail-debugger/web:typecheck"
      - run: pnpm exec nx run "@mail-debugger/server-e2e:typecheck"
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: pnpm exec nx fix-ci
        if: always()
