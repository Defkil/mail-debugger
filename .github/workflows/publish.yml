name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec nx run-many -t lint -p @mail-debugger/server @mail-debugger/cli mail-debugger-api mail-debugger-cli types api-client

      - name: Test
        run: pnpm exec nx run-many -t test -p @mail-debugger/server @mail-debugger/cli mail-debugger-api mail-debugger-cli types api-client

      - name: Typecheck
        run: pnpm exec nx run-many -t typecheck -p @mail-debugger/server @mail-debugger/cli mail-debugger-api mail-debugger-cli types api-client

      - name: Build publishable artifacts
        run: pnpm exec nx run-many -t build -p @mail-debugger/server mail-debugger-api mail-debugger-cli --skip-nx-cache

      - name: Publish mail-debugger
        run: npm publish

      - name: Publish mail-debugger-api
        run: npm publish
        working-directory: packages/api

      - name: Publish mail-debugger-cli
        run: npm publish
        working-directory: packages/cli
