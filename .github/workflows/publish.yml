name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint
      - run: pnpm exec nx run types:lint
      - run: pnpm exec nx run api-client:lint
      - run: pnpm exec nx run "@mail-debugger/server:lint"
      - run: pnpm exec nx run "@mail-debugger/cli:lint"

      # Build publishable artifacts (must run before test for consistency with CI)
      - run: pnpm exec nx run "@mail-debugger/server:build" --skip-nx-cache
      - run: pnpm exec nx run "@mail-debugger/cli:build" --skip-nx-cache
      - run: pnpm exec nx run mail-debugger-api:build --skip-nx-cache
      - run: pnpm exec nx run mail-debugger-cli:build --skip-nx-cache

      # Test
      - run: pnpm exec nx run api-client:test
      - run: pnpm exec nx run "@mail-debugger/server:test"
      - run: pnpm exec nx run "@mail-debugger/cli:test"
      - run: pnpm exec nx run mail-debugger-api:test
      - run: pnpm exec nx run mail-debugger-cli:test

      # Typecheck
      - run: pnpm exec nx run types:typecheck
      - run: pnpm exec nx run api-client:typecheck
      - run: pnpm exec nx run "@mail-debugger/server:typecheck"
      - run: pnpm exec nx run "@mail-debugger/cli:typecheck"

      - name: Publish mail-debugger
        run: npm publish

      - name: Publish mail-debugger-api
        run: npm publish
        working-directory: packages/api

      - name: Publish mail-debugger-cli
        run: npm publish
        working-directory: packages/cli
